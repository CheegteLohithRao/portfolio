<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electronics Engineering Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Orbitron", "Inter", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"]
            },
            colors: {
              void: "#05070c",
              panel: "#0b1018",
              copper: "#f59e0b",
              neon: "#2ef2ff",
              acid: "#b8ff2c",
              magenta: "#ff3df2"
            },
            boxShadow: {
              neon: "0 0 28px rgba(46, 242, 255, 0.25)",
              copper: "0 0 26px rgba(245, 158, 11, 0.24)"

          }
        }
      };

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@600;700;800&display=swap"

    />
    <link rel="stylesheet" href="./page.css" />

  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/framer-motion@12.18.1/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="./page.js"></script>
  </body>
